apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-tracker-app-of-apps
  namespace: argocd
  labels:
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: task-tracker
  source:
    repoURL: https://github.com/rashmiranjandevops/employee-task-tracker-gitops.git
    targetRevision: HEAD
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
