# values-prod.yaml — Production overrides
global:
  environment: production

backend:
  replicaCount: 3
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  hpa:
    minReplicas: 3
    maxReplicas: 20
  env:
    LOG_LEVEL: info
    RATE_LIMIT_MAX: "200"
    DB_POOL_MAX: "30"

frontend:
  replicaCount: 3
  hpa:
    minReplicas: 3
    maxReplicas: 10
