global:
  imageRegistry: ""
  imagePullSecrets: []
  environment: production
  domain: rashmidevops.xyz

image:
  registry: ""
  tag: "latest"
  pullPolicy: Always

backend:
  replicaCount: 2
  image:
    repository: task-tracker-backend
    tag: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    cpuUtilization: 70
    memoryUtilization: 80
  pdb:
    enabled: true
    minAvailable: 1
  env:
    NODE_ENV: production
    PORT: "5000"
    LOG_LEVEL: info
    JWT_EXPIRES_IN: 8h
    JWT_REFRESH_EXPIRES_IN: 7d
    RATE_LIMIT_MAX: "200"
    DB_POOL_MAX: "20"
    DB_POOL_MIN: "5"

frontend:
  replicaCount: 2
  image:
    repository: task-tracker-frontend
    tag: ""
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    cpuUtilization: 70
  pdb:
    enabled: true
    minAvailable: 1

ingress:
  enabled: true
  class: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/ssl-redirect: "443"
  hosts:
    frontend: app.rashmidevops.xyz
    backend: api.rashmidevops.xyz
  tls:
    enabled: true
    certificateArn: ""
  # ARN of the aws_wafv2_web_acl (see terraform/modules/waf) to attach to the
  # ALB that the AWS Load Balancer Controller creates for this Ingress.
  # Leave empty to deploy without WAF protection.
  wafAclArn: ""

monitoring:
  enabled: true
  serviceMonitor: true

networkPolicy:
  enabled: true

serviceAccount:
  create: true
  irsaRoleArn: ""

secrets:
  dbHost: ""
  dbUser: ""
  dbPassword: ""
  jwtSecret: ""
  jwtRefreshSecret: ""
