global:
  imageRegistry: "897074277336.dkr.ecr.us-east-1.amazonaws.com"
  imagePullSecrets: []
  environment: dev
  domain: rashmidevops.xyz

image:
  registry: "897074277336.dkr.ecr.us-east-1.amazonaws.com"
  tag: "latest"
  pullPolicy: Always

backend:
  replicaCount: 2
  image:
    repository: task-tracker-backend
    tag: "10"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    cpuUtilization: 70
    memoryUtilization: 80
  pdb:
    enabled: true
    minAvailable: 1
  env:
    NODE_ENV: production
    PORT: "5000"
    LOG_LEVEL: info
    JWT_EXPIRES_IN: 8h
    JWT_REFRESH_EXPIRES_IN: 7d
    RATE_LIMIT_MAX: "200"
    DB_POOL_MAX: "20"
    DB_POOL_MIN: "5"

frontend:
  replicaCount: 2
  image:
    repository: task-tracker-frontend
    tag: "10"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    cpuUtilization: 70
  pdb:
    enabled: true
    minAvailable: 1

ingress:
  enabled: true
  class: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/ssl-redirect: "443"
  hosts:
    frontend: dev-app.rashmidevops.xyz
    backend: dev-api.rashmidevops.xyz
  tls:
    enabled: true
    certificateArn: "arn:aws:acm:us-east-1:897074277336:certificate/65d642d5-c198-4075-9132-58e371b414f3"
  # ARN of the aws_wafv2_web_acl (see terraform/modules/waf) to attach to the
  # ALB that the AWS Load Balancer Controller creates for this Ingress.
  # Leave empty to deploy without WAF protection.
  wafAclArn: "arn:aws:wafv2:us-east-1:897074277336:regional/webacl/task-tracker-dev-waf/4d65e0f4-7470-4ee0-8eec-2bcdf3588bcb"

monitoring:
  enabled: true
  serviceMonitor: true

networkPolicy:
  enabled: true

serviceAccount:
  create: true
  irsaRoleArn: "arn:aws:iam::897074277336:role/task-tracker-dev-app-irsa-role"

secrets:
  dbHost: "task-tracker-dev-mysql.cq3myy4smi8a.us-east-1.rds.amazonaws.com"
  dbUser: "tasktracker_admin"
