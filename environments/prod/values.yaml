# GitOps-managed values for production.
# This file's image tags are auto-updated by the Jenkins pipeline's
# "Update GitOps Repo" stage on every successful build of the `main` branch.

task-tracker:
  global:
    environment: production
    domain: rashmidevops.xyz

  image:
    registry: "897074277336.dkr.ecr.us-east-1.amazonaws.com"
    pullPolicy: Always

  backend:
    replicaCount: 3
    image:
      repository: task-tracker-backend
      tag: "latest"   # updated automatically by CI
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 20

  frontend:
    replicaCount: 3
    image:
      repository: task-tracker-frontend
      tag: "latest"   # updated automatically by CI
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 10

  ingress:
    enabled: true
    hosts:
      frontend: app.rashmidevops.xyz
      backend: api.rashmidevops.xyz
    tls:
      enabled: true
      certificateArn: "arn:aws:acm:us-east-1:897074277336:certificate/091e16a8-8c97-4f48-a3a5-07cd7b5f594d"
    # Output of module.waf.web_acl_arn (terraform/modules/waf) for this
    # environment. Must be filled in after `terraform apply` so the ALB the
    # AWS Load Balancer Controller creates for this Ingress is actually
    # protected — the Web ACL is otherwise only associated with the
    # Terraform-managed placeholder ALB, not real production traffic.
    wafAclArn: "arn:aws:wafv2:us-east-1:897074277336:regional/webacl/task-tracker-dev-waf/4d65e0f4-7470-4ee0-8eec-2bcdf3588bcb"

  serviceAccount:
    create: true
    irsaRoleArn: "arn:aws:iam::897074277336:role/task-tracker-dev-app-irsa-role"

  # Secrets are injected at sync time via External Secrets Operator / Sealed Secrets
  # NEVER commit plaintext secrets here.
  secrets:
    dbHost: "task-tracker-dev-mysql.cq3myy4smi8a.us-east-1.rds.amazonaws.com"
    dbUser: "tasktracker_admin"
    dbPassword: "b9z)JJ(E=BJpwJqx!g3SOSNRluY6hk+x"
    jwtSecret: " 4b747b91769305e8a4e1c3a06e6b54636d6632b054a68042220b0faea3c0e7a6950a32677d3538b4c7494113006ef149"
    jwtRefreshSecret: " 3c821e111b8a4e4ad61b21183553dfab4442b19deeb8d96026317eee1651b6dceec54f42a78dd63b511353cd5214a864"
