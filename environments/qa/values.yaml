# GitOps-managed values for QA.
# Image tags auto-updated by Jenkins on every push to the `qa` branch.

task-tracker:
  global:
    environment: qa
    domain: rashmidevops.xyz

  image:
    registry: "897074277336.dkr.ecr.us-east-1.amazonaws.com"
    pullPolicy: Always

  backend:
    replicaCount: 1
    image:
      repository: task-tracker-backend
      tag: "latest"
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
    env:
      LOG_LEVEL: info
      RATE_LIMIT_MAX: "300"
      DB_POOL_MAX: "10"

  frontend:
    replicaCount: 1
    image:
      repository: task-tracker-frontend
      tag: "latest"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 3

  ingress:
    enabled: true
    hosts:
      frontend: qa-app.rashmidevops.xyz
      backend: qa-api.rashmidevops.xyz
    tls:
      enabled: true
      certificateArn: "arn:aws:acm:us-east-1:897074277336:certificate/091e16a8-8c97-4f48-a3a5-07cd7b5f594d"

  serviceAccount:
    create: true
    irsaRoleArn: "arn:aws:iam::897074277336:role/task-tracker-dev-app-irsa-role"

  secrets:
    dbHost: "task-tracker-dev-mysql.cq3myy4smi8a.us-east-1.rds.amazonaws.com"
    dbUser: "tasktracker_admin"
    dbPassword: "b9z)JJ(E=BJpwJqx!g3SOSNRluY6hk+x"
